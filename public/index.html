<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI for Busy People | Save Time with AI Agents</title>

  <meta name="description" content="Find the best AI tools for your needs. Save time, reduce stress, and automate your work with AI agents.">

  <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body>

  <div id="header"></div>

  <main class="container">

    <!-- HERO (keep narrow for readability) -->
    <section class="section hero">
      <div class="section-center">
        <h1 class="hero-title">See exactly what AI can do for you</h1>
        <p class="hero-subtitle">
          Tell us what you need help with, and we’ll match you with the best AI tools for your situation.
        </p>
      </div>
    </section>

    <!-- RECOMMENDER (WIDE) -->
    <section class="section">
      <div class="section-wide">

        <div id="recommender" class="card recommender-card">

          <!-- Q1 ICON GRID -->
          <div class="form-group">
            <label class="form-label"><strong>What do you want AI to take off your plate?</strong></label>

            <div class="icon-grid" id="task">

              <button class="icon-option active" data-value="writing">✍️<span>Content</span></button>
              <button class="icon-option" data-value="email">📧<span>Email</span></button>
              <button class="icon-option" data-value="daily">⏱️<span>Tasks</span></button>
              <button class="icon-option" data-value="research">🔍<span>Research</span></button>
              <button class="icon-option" data-value="organization">🧠<span>Organize</span></button>
              <button class="icon-option" data-value="automation">⚙️<span>Automation</span></button>
              <button class="icon-option" data-value="personal_assistant">🗂️<span>Life Admin</span></button>
              <button class="icon-option" data-value="meetings">📝<span>Meetings</span></button>
              <button class="icon-option" data-value="coding">💻<span>Coding</span></button>
              <button class="icon-option" data-value="design">🎨<span>Design</span></button>
              <button class="icon-option" data-value="video">🎬<span>Video</span></button>
              <button class="icon-option" data-value="marketing">📈<span>Marketing</span></button>

            </div>
          </div>

<!-- Q2 SLIDER -->
<div class="form-group">
  <label class="form-label">
    <strong>How much control do you want AI to have?</strong>
  </label>

  <div class="slider-group">
    <span>Suggestions</span>
    <input type="range" id="control" min="1" max="4" step="1" value="2">
    <span>Fully done</span>
  </div>

  <div id="control-label" class="slider-label">
    Help me decide
  </div>
</div>


<!-- Q3 SLIDER -->
<div class="form-group">
  <label class="form-label">
    <strong>How easy do you want your AI tools to be?</strong>
  </label>

  <div class="slider-group">
    <span>Simple</span>
    <input type="range" id="ease" min="1" max="3" step="1" value="1">
    <span>Powerful</span>
  </div>

  <div id="ease-label" class="slider-label">
    Simple and easy (works out of the box)
  </div>
</div>
          <!-- Q4 TOGGLE -->
          <div class="form-group">
            <label class="form-label"><strong>Only show free tools?</strong></label>

            <label class="toggle">
              <input type="checkbox" id="price">
              <span class="toggle-slider"></span>
            </label>

            <small class="toggle-hint">Off = include paid tools</small>
          </div>

          <button id="runBtn" class="button button-primary button-full">
            Show Recommendations
          </button>

        </div>

      </div>
    </section>

    <!-- RESULTS (WIDE — IMPORTANT) -->
    <section class="section">
      <div class="section-wide">
        <div id="results"></div>
      </div>
    </section>

    <!-- UPGRADE -->
    <section class="section">
      <div class="section-wide">
        <div id="upgrade-results"></div>
      </div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="/assets/js/components.js"></script>
  <script type="module" src="/assets/js/app.js"></script>

</body>
</html>
